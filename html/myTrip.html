<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <title>나의 여행지</title>
</head>
<body>
  <div class="container">
    <p class="home-link"><a href="index.html">← 홈으로</a></p>
    <h1>나의 여행 앨범</h1>

    <h2>여행 배경음악</h2>
    <audio controls>
      <source src="../media/music.mp3" type="audio/mpeg">
    </audio>

    <h2>졸업 여행</h2>

    <div class="trip-grid">
      <div class="trip-item">
        <img src="../media/할리우드.jpeg" alt="할리우드" width="400">
        <p class="trip-card">할리우드</p>
      </div>

      <div class="trip-item">
        <img src="../media/금문교.jpeg" alt="금문교" width="400">
        <p class="trip-card">금문교</p>
      </div>

      <div class="trip-item">
        <img src="../media/그랜드 캐니언.jpeg" alt="그랜드 캐니언" width="400">
        <p class="trip-card">그랜드 캐니언</p>
      </div>

      <div class="trip-item">
        <img src="../media/앤털롭 캐니언.jpeg" alt="앤털롭 캐니언 X" width="400">
        <p class="trip-card">앤털롭 캐니언 X</p>
      </div>
    </div>

    <h2>나의 여행 브이로그</h2>
    <video width="480" controls>
      <source src="../media/홈런.MOV">
    </video>
    <p>이정후의 그라운드 홈런 (소리 주의)</p>
  </div>
</body>
</html>
