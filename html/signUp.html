<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <title>회원가입</title>
</head>
<body>
  <div class="container">
    <p class="home-link"><a href="index.html">← 홈으로</a></p>
    <h1>회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>

    <form action="signUpResult.html" method="get">

      <fieldset>
        <legend>계정 정보</legend>

        <label for="userId">아이디:</label>
        <input type="text" id="userId" name="userId" placeholder="4~15자 영문/숫자" required>
        <br>

        <label for="userPw">비밀번호:</label>
        <input type="password" id="userPw" name="userPw" placeholder="8자 이상 입력" required>
        <br>

        <label for="userEmail">이메일:</label>
        <input type="text" id="userEmail" name="userEmail" placeholder="example">
        @
        <select name="emailDomain">
          <option value="">직접입력</option>
          <option value="gmail.com">gmail.com</option>
          <option value="naver.com">naver.com</option>
          <option value="daum.net">daum.net</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>개인 프로필 정보</legend>

        <label for="name">이름:</label>
        <input type="text" id="name" name="name" required>
        <br>

        <label for="birth">생년월일:</label>
        <input type="date" id="birth" name="birth">
        <br>

        <label>성별:</label>
        <input type="radio" id="male" name="gender" value="male" checked>
        <label for="male">남성</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">여성</label>
        <br>

        <label>관심 분야 (중복 선택 가능):</label><br>
        <input type="checkbox" id="interest1" name="interest" value="web">
        <label for="interest1">웹 프론트엔드 (Vue.js/HTML)</label><br>
        <input type="checkbox" id="interest2" name="interest" value="uiux">
        <label for="interest2">UI/UX 디자인 표준</label><br>
        <input type="checkbox" id="interest3" name="interest" value="backend">
        <label for="interest3">백엔드 &amp; 데이터베이스</label><br>
        <input type="checkbox" id="interest4" name="interest" value="cloud">
        <label for="interest4">클라우드 &amp; 인프라</label><br>

        <label for="route">가입 경로:</label>
        <select id="route" name="route">
          <option value="">선택</option>
          <option value="search">검색</option>
          <option value="sns">SNS</option>
          <option value="friend">지인 추천</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>자기소개</legend>
        <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
        <textarea id="intro" name="intro" rows="4" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
      </fieldset>

      <input type="submit" value="동의하고 회원가입">
      <input type="reset" value="다시 작성">

    </form>
  </div>
</body>
</html>
