<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <title>회원가입</title>
</head>
<body>
  <div class="container">
    <p class="home-link"><a href="index.html">← 홈으로</a></p>
    <h1>회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>

    <form action="signUpResult.html" method="get">

      <fieldset>
        <legend>계정 정보</legend>

        <div class="form-row">
          <label for="userId">아이디</label>
          <input type="text" id="userId" name="userId" placeholder="4~15자 영문/숫자" required>
        </div>

        <div class="form-row">
          <label for="userPw">비밀번호</label>
          <div class="password-wrapper">
            <input type="password" id="userPw" name="userPw" placeholder="8자 이상 입력" required>
            <button type="button" class="password-toggle" id="togglePw" aria-label="비밀번호 표시"></button>
          </div>
        </div>

        <div class="form-row">
          <label for="userPwConfirm">비밀번호 확인</label>
          <div class="password-wrapper">
            <input type="password" id="userPwConfirm" name="userPwConfirm" placeholder="비밀번호를 다시 입력하세요" required>
            <button type="button" class="password-toggle" id="togglePwConfirm" aria-label="비밀번호 표시"></button>
          </div>
        </div>
        <p id="pwMatchMsg" class="form-hint"></p>

        <div class="form-row">
          <label for="userEmail">이메일</label>
          <div class="email-group">
            <input type="text" id="userEmail" name="userEmail" placeholder="example">
            <span>@</span>
            <input type="text" id="emailDomainCustom" name="emailDomainCustom" placeholder="도메인 입력">
            <select id="emailDomainSelect" name="emailDomainSelect">
              <option value="">직접입력</option>
              <option value="gmail.com">gmail.com</option>
              <option value="naver.com">naver.com</option>
              <option value="daum.net">daum.net</option>
            </select>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>개인 프로필 정보</legend>

        <div class="form-row">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-row">
          <label for="birth">생년월일</label>
          <input type="date" id="birth" name="birth">
        </div>

        <div class="form-row">
          <label>성별</label>
          <span class="inline-options">
            <input type="radio" id="male" name="gender" value="male" checked>
            <label for="male">남성</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">여성</label>
          </span>
        </div>

        <div class="form-row form-row-top">
          <label>관심 분야</label>
          <span class="inline-options stacked">
            <span class="checkbox-item">
              <input type="checkbox" id="interest1" name="interest" value="web">
              <label for="interest1">웹 프론트엔드 (Vue.js/HTML)</label>
            </span>
            <span class="checkbox-item">
              <input type="checkbox" id="interest2" name="interest" value="uiux">
              <label for="interest2">UI/UX 디자인 표준</label>
            </span>
            <span class="checkbox-item">
              <input type="checkbox" id="interest3" name="interest" value="backend">
              <label for="interest3">백엔드 &amp; 데이터베이스</label>
            </span>
            <span class="checkbox-item">
              <input type="checkbox" id="interest4" name="interest" value="cloud">
              <label for="interest4">클라우드 &amp; 인프라</label>
            </span>
          </span>
        </div>

        <div class="form-row">
          <label for="route">가입 경로</label>
          <select id="route" name="route">
            <option value="">선택</option>
            <option value="search">검색</option>
            <option value="sns">SNS</option>
            <option value="friend">지인 추천</option>
          </select>
        </div>
      </fieldset>

      <fieldset>
        <legend>자기소개</legend>
        <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
        <textarea id="intro" name="intro" rows="4" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
      </fieldset>

      <input type="submit" id="submitBtn" value="동의하고 회원가입">
      <input type="reset" value="다시 작성">

    </form>
  </div>
  <script src="../script/signupValidation.js"></script>
</body>
</html>
